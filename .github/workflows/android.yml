name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        env:
          # IMPORTANT: Verify these names exactly match your GitHub Secrets/Variables
          # Use secrets.VAR_NAME for Secrets, or vars.VAR_NAME for Variables
          VITE_SUPABASE_PROJECT_ID: "${{ vars.VITE_SUPABASE_PROJECT_ID || secrets.VITE_SUPABASE_PROJECT_ID }}"
          VITE_SUPABASE_PUBLISHABLE_KEY: "${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          VITE_SUPABASE_URL: "${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}"
          VITE_GEMINI_API_KEY: "${{ vars.VITE_GEMINI_API_KEY || secrets.VITE_GEMINI_API_KEY }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform
        run: |
          npx cap add android
          npx cap copy android
          npx cap sync android
          # Inject permissions for audio recording and settings
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kigezi-vet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
