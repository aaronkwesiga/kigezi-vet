<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Kigezi Vet</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // This script redirects a 404 to the index page with the path as a hash
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') + '/#' +
            l.pathname.split('/').slice(1).join('/') +
            (l.search ? l.search : '') +
            l.hash
        );
    </script>
</head>

<body>
</body>

</html>
